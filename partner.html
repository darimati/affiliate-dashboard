<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DARIMATI Partner Dashboard</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.css" rel="stylesheet">
<style>
:root{
  --bg:#ffffff;--bg-soft:#f7f7f8;--bg-dark:#0a0a0a;
  --text:#111;--text-inv:#fff;--muted:#6b6b6b;--muted-light:#999;
  --accent:#6366f1;--accent-soft:#eef0ff;--accent-dark:#4f46e5;
  --green:#16a34a;--green-soft:#dcfce7;--yellow:#ca8a04;--yellow-soft:#fef9c3;--red:#dc2626;--red-soft:#fee2e2;
  --line:#e6e6e6;--line-soft:#f0f0f0;
  --shadow:0 1px 2px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.05);
  --radius:9px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg-soft);color:var(--text);-webkit-font-smoothing:antialiased}

/* Nav */
.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--line);height:54px;display:flex;align-items:center;padding:0 24px}
.nav .logo{font-size:15px;font-weight:800;letter-spacing:-.02em}
.nav .logo span{color:var(--accent)}
.nav .right{margin-left:auto;display:flex;align-items:center;gap:12px}
.nav .partner-badge{background:var(--accent-soft);color:var(--accent);font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;letter-spacing:.04em}
.nav .avatar{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}

/* Container */
.container{max-width:1040px;margin:0 auto;padding:0 24px}

/* Hero */
.hero{background:var(--bg-dark);padding:48px 0 40px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:-40%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(99,102,241,.12) 0%,transparent 70%);pointer-events:none}
.hero .container{position:relative;z-index:1}
.hero .greeting{font-size:clamp(13px,1.5vw,14px);color:var(--muted-light);margin-bottom:8px;letter-spacing:.04em}
.hero h1{font-size:clamp(24px,3.5vw,36px);font-weight:800;color:var(--text-inv);letter-spacing:-.02em;line-height:1.2}
.hero h1 em{font-style:normal;color:var(--accent);background:linear-gradient(135deg,#818cf8,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero .hero-stats{display:flex;gap:32px;margin-top:24px}
.hero .hero-stat .num{font-size:28px;font-weight:800;color:var(--text-inv)}
.hero .hero-stat .label{font-size:11px;color:var(--muted-light);text-transform:uppercase;letter-spacing:.12em;margin-top:2px}

/* KPI Cards */
.kpi-section{padding:32px 0 0}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.kpi-card{background:var(--bg);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border:1px solid var(--line-soft)}
.kpi-card.highlight{background:var(--bg-dark);color:var(--text-inv)}
.kpi-card .kpi-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);margin-bottom:8px}
.kpi-card.highlight .kpi-label{color:var(--muted-light)}
.kpi-card .kpi-value{font-size:22px;font-weight:800}
.kpi-card .kpi-sub{font-size:12px;margin-top:4px}
.kpi-card .kpi-sub.up{color:var(--green)}
.kpi-card .kpi-sub.neutral{color:var(--muted)}

/* Dashboard Window */
.dash-section{padding:32px 0}
.dash-window{background:var(--bg);border-radius:12px;box-shadow:var(--shadow);border:1px solid var(--line);overflow:hidden}
.dash-chrome{background:#f5f5f5;border-bottom:1px solid var(--line);padding:10px 14px;display:flex;align-items:center;gap:8px}
.dash-dots{display:flex;gap:6px}
.dash-dots i{width:10px;height:10px;border-radius:50%;display:block}
.dash-dots .r{background:#ff5f57}.dash-dots .y{background:#febc2e}.dash-dots .g{background:#28c840}
.dash-url{flex:1;margin-left:8px;background:#fff;border:1px solid var(--line);border-radius:5px;padding:4px 10px;font-size:11px;color:var(--muted)}
.dash-body{padding:24px}

/* Chart Area */
.chart-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:24px}
.chart-box{background:var(--bg-soft);border-radius:var(--radius);padding:20px;border:1px solid var(--line-soft)}
.chart-box h3{font-size:13px;font-weight:700;margin-bottom:16px}
.chart-box .chart-label{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin-bottom:12px}

/* Bar Chart */
.bars{display:flex;align-items:flex-end;gap:8px;height:120px;padding-top:8px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-col .bar{width:100%;border-radius:4px 4px 0 0;background:var(--line);min-height:4px;transition:height .6s ease}
.bar-col .bar.active{background:var(--accent)}
.bar-col .bar-label{font-size:10px;color:var(--muted)}
.bar-col .bar-val{font-size:10px;font-weight:600;color:var(--text)}

/* Donut / Settlement */
.settle-ring{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.ring-wrap{position:relative;width:100px;height:100px}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-wrap .ring-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ring-wrap .ring-pct{font-size:20px;font-weight:800;color:var(--accent)}
.ring-wrap .ring-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.settle-info{width:100%;margin-top:12px}
.settle-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--line-soft)}
.settle-row:last-child{border-bottom:none}
.settle-row .sk{color:var(--muted)}
.settle-row .sv{font-weight:600}

/* Link Card */
.link-section{padding:0 0 32px}
.link-card{background:var(--bg);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border:1px solid var(--line-soft)}
.link-card h3{font-size:13px;font-weight:700;margin-bottom:14px}
.link-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line-soft)}
.link-item:last-child{border-bottom:none}
.link-item .li-left{display:flex;align-items:center;gap:10px}
.link-item .li-icon{width:32px;height:32px;border-radius:8px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:14px}
.link-item .li-name{font-size:13px;font-weight:600}
.link-item .li-url{font-size:11px;color:var(--muted);word-break:break-all}
.link-item .li-copy{padding:6px 12px;border-radius:6px;background:var(--bg-soft);border:1px solid var(--line);font-size:11px;font-weight:600;cursor:pointer;color:var(--text);transition:all .2s}
.link-item .li-copy:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Progress Bar */
.progress-track{height:6px;background:var(--line-soft);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .6s ease}

/* Info Grid */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
.info-card{background:var(--bg-soft);border-radius:var(--radius);padding:16px;border:1px solid var(--line-soft)}
.info-card .ic-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin-bottom:6px}
.info-card .ic-value{font-size:14px;font-weight:600}

/* Footer */
.footer{text-align:center;padding:24px 0 32px;font-size:12px;color:var(--muted)}
.footer a{color:var(--accent);text-decoration:none}

/* Mobile */
@media(max-width:860px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .chart-grid{grid-template-columns:1fr}
  .hero .hero-stats{flex-wrap:wrap;gap:20px}
  .info-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
  .kpi-grid{grid-template-columns:1fr}
  .container{padding:0 14px}
  .hero{padding:32px 0 28px}
  .hero h1{font-size:22px}
  .bars{height:80px}
}
</style>
</head>
<body>

<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:var(--muted)">
    <div style="text-align:center"><div style="font-size:24px;margin-bottom:8px">Loading...</div><div style="font-size:13px">Google Sheets 데이터 로딩 중</div></div>
  </div>
</div>

<script>
var SHEET_ID='1TtkspzT2Ng9Mm9Kp7EOPBx-ns2eDY5Mbvixt5tL_LcU';
var SHEET_NAME='\uc2a4\ub9c8\ud2b8\uc2a4\ud1a0\uc5b4 \ub9c1\ud06c \uc544\uce74\uc774\ube0c';

function getParam(k){return new URLSearchParams(location.search).get(k)}
function gvizUrl(s){return'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:json&sheet='+encodeURIComponent(s)}
function parseGviz(t){var m=t.match(/google\.visualization\.Query\.setResponse\(([\s\S]+)\);?\s*$/);if(!m){var j=t.match(/\{[\s\S]+\}/);return j?JSON.parse(j[0]):null}return JSON.parse(m[1])}
function extractRows(d){if(!d||!d.table)return[];var c=d.table.cols.map(function(x){return x.label||''});return d.table.rows.map(function(r){var o={};r.c.forEach(function(cell,i){o[c[i]]=cell?(cell.f||cell.v||''):''});return o})}
function pm(s){if(!s||s==='-'||s==='')return 0;return parseInt(String(s).replace(/[^0-9]/g,''),10)||0}
function fm(n){return n===0?'0\uc6d0':n.toLocaleString('ko-KR')+'\uc6d0'}
function fms(n){if(n===0)return'0';if(n>=10000)return(n/10000).toFixed(1)+'\ub9cc';return n.toLocaleString('ko-KR')}

function renderPartner(p){
  var name=p['\ud30c\ud2b8\ub108\uba85']||'';
  var initial=name.charAt(0);
  var sales=pm(p['\ud310\ub9e4\uac74\uc218']);
  var revenue=pm(p['\ub9e4\ucd9c']);
  var price=pm(p['\uae08\uc561 (\ub300\ud45c\uac00 \uae30\uc900)']||p['\uae08\uc561']||'129000');
  var commission=Math.round(revenue*0.1);
  var threshold=100000;
  var pct=revenue>0?Math.min(100,Math.round(revenue/threshold*100)):0;
  var openDate=p['\uc624\ud508\uc77c\uc790']||'-';
  var url=p['\ud310\ub9e4\ub9c1\ud06c URL']||'';
  var status=p['\ud310\ub9e4\ub9c1\ud06c \uc804\ub2ec']||'';

  // Simulated monthly bars (placeholder until real data exists)
  var months=['1\uc6d4','2\uc6d4','3\uc6d4','4\uc6d4','5\uc6d4','6\uc6d4'];
  var vals=[0,0,0,0,0,revenue];
  var maxVal=Math.max.apply(null,vals)||1;

  var h='';

  // Nav
  h+='<nav class="nav"><div class="container" style="display:flex;align-items:center;width:100%;max-width:1040px;margin:0 auto">';
  h+='<div class="logo"><span>DARIMATI</span> Partner</div>';
  h+='<div class="right"><span class="partner-badge">PARTNER</span><div class="avatar">'+initial+'</div></div>';
  h+='</div></nav>';

  // Hero
  h+='<section class="hero"><div class="container">';
  h+='<div class="greeting">Welcome back,</div>';
  h+='<h1>'+name+' <em>Dashboard</em></h1>';
  h+='<div class="hero-stats">';
  h+='<div class="hero-stat"><div class="num">'+(sales>0?sales.toLocaleString():'0')+'</div><div class="label">\ud310\ub9e4 \uac74\uc218</div></div>';
  h+='<div class="hero-stat"><div class="num">'+(revenue>0?fms(revenue):'0')+'</div><div class="label">\ub204\uc801 \ub9e4\ucd9c</div></div>';
  h+='<div class="hero-stat"><div class="num">'+(commission>0?fms(commission):'0')+'</div><div class="label">\uc608\uc0c1 \uc218\uc775</div></div>';
  h+='</div></div></section>';

  // KPI Cards
  h+='<section class="kpi-section"><div class="container"><div class="kpi-grid">';
  h+='<div class="kpi-card"><div class="kpi-label">\ud310\ub9e4 \uac74\uc218</div><div class="kpi-value">'+(sales>0?sales+'\uac74':'0\uac74')+'</div><div class="kpi-sub neutral">\ub204\uc801 \uc804\uccb4</div></div>';
  h+='<div class="kpi-card"><div class="kpi-label">\ub9e4\ucd9c</div><div class="kpi-value">'+(revenue>0?fm(revenue):'0\uc6d0')+'</div><div class="kpi-sub neutral">\ub204\uc801</div></div>';
  h+='<div class="kpi-card highlight"><div class="kpi-label">\uc218\uc775 (10%)</div><div class="kpi-value" style="color:var(--accent)">'+(commission>0?fm(commission):'0\uc6d0')+'</div><div class="kpi-sub" style="color:var(--muted-light)">\uc608\uc0c1 \uc815\uc0b0\uc561</div></div>';
  h+='<div class="kpi-card"><div class="kpi-label">\uc815\uc0b0 \uc0c1\ud0dc</div><div class="kpi-value">'+(revenue>=threshold?'<span style="color:var(--green)">\ub2ec\uc131</span>':'<span style="color:var(--yellow)">'+pct+'%</span>')+'</div><div class="kpi-sub neutral">'+(revenue>=threshold?'\uc775\uc6d4 15\uc77c \uc9c0\uae09':fm(threshold-revenue)+' \ub0a8\uc74c')+'</div></div>';
  h+='</div></div></section>';

  // Dashboard Window
  h+='<section class="dash-section"><div class="container"><div class="dash-window">';
  h+='<div class="dash-chrome"><div class="dash-dots"><i class="r"></i><i class="y"></i><i class="g"></i></div><div class="dash-url">darimati.io/partner/'+encodeURIComponent(name)+'</div></div>';
  h+='<div class="dash-body">';

  // Chart Grid
  h+='<div class="chart-grid">';

  // Bar chart
  h+='<div class="chart-box"><div class="chart-label">\uc6d4\ubcc4 \ub9e4\ucd9c \ucd94\uc774</div><div class="bars">';
  months.forEach(function(m,i){
    var barH=vals[i]>0?Math.round((vals[i]/maxVal)*100):4;
    h+='<div class="bar-col"><div class="bar-val">'+(vals[i]>0?fms(vals[i]):'-')+'</div><div class="bar'+(i===months.length-1?' active':'')+'" style="height:'+barH+'%"></div><div class="bar-label">'+m+'</div></div>';
  });
  h+='</div></div>';

  // Settlement ring
  h+='<div class="chart-box"><div class="chart-label">\uc815\uc0b0 \uc9c4\ud589\ub960</div><div class="settle-ring">';
  var circumference=2*Math.PI*42;
  var dashoffset=circumference-(pct/100)*circumference;
  h+='<div class="ring-wrap"><svg width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="none" stroke="#e6e6e6" stroke-width="8"/><circle cx="50" cy="50" r="42" fill="none" stroke="#6366f1" stroke-width="8" stroke-linecap="round" stroke-dasharray="'+circumference+'" stroke-dashoffset="'+dashoffset+'"/></svg><div class="ring-text"><div class="ring-pct">'+pct+'%</div><div class="ring-label">\ub2ec\uc131\ub960</div></div></div>';
  h+='<div class="settle-info"><div class="settle-row"><span class="sk">\ud604\uc7ac \ub9e4\ucd9c</span><span class="sv">'+(revenue>0?fm(revenue):'0\uc6d0')+'</span></div><div class="settle-row"><span class="sk">\ucd5c\uc18c \uae08\uc561</span><span class="sv">100,000\uc6d0</span></div><div class="settle-row"><span class="sk">\uc218\uc218\ub8cc\uc728</span><span class="sv">10%</span></div><div class="settle-row"><span class="sk">\uc9c0\uae09\uc77c</span><span class="sv">\uc775\uc6d4 15\uc77c</span></div></div>';
  h+='</div></div>';

  h+='</div>'; // chart-grid

  // Info grid
  h+='<div class="info-grid">';
  h+='<div class="info-card"><div class="ic-label">\uc624\ud508\uc77c</div><div class="ic-value">'+openDate+'</div></div>';
  h+='<div class="info-card"><div class="ic-label">\uc0c1\ud488 \uae08\uc561</div><div class="ic-value">'+(price>0?fm(price):'-')+'</div></div>';
  h+='<div class="info-card"><div class="ic-label">\uc0c1\ud0dc</div><div class="ic-value">'+((!status||status==='-')?'<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;background:var(--green-soft);color:var(--green);font-size:12px;font-weight:600">\ud65c\uc131</span>':status)+'</div></div>';
  h+='<div class="info-card"><div class="ic-label">\ub9e4\ucd9c \uae30\uc900</div><div class="ic-value">\uad6d\ub0b4 \uc9c1\uc811 10%</div></div>';
  h+='</div>';

  h+='</div></div>'; // dash-body, dash-window

  // Link card
  if(url){
    h+='<div style="margin-top:20px"><div class="link-card"><h3>\ub098\uc758 \ud788\ub4e0\ub9c1\ud06c</h3>';
    h+='<div class="link-item"><div class="li-left"><div class="li-icon">\ud83d\udcce</div><div><div class="li-name">\uc2a4\ub9c8\ud2b8\uc2a4\ud1a0\uc5b4 \uc804\uc6a9 \ub9c1\ud06c</div><div class="li-url">'+url+'</div></div></div><button class="li-copy" onclick="navigator.clipboard.writeText(\''+url+'\');this.textContent=\'\u2713 \ubcf5\uc0ac\ub428\';setTimeout(function(){document.querySelector(\'.li-copy\').textContent=\'\ubcf5\uc0ac\'},1500)">\ubcf5\uc0ac</button></div>';
    h+='</div></div>';
  }

  h+='</div></section>'; // container, dash-section

  // Footer
  h+='<div class="footer"><div class="container">DARIMATI Affiliate Partner Dashboard \u00b7 5\ubd84 \uc790\ub3d9 \uac31\uc2e0</div></div>';

  return h;
}

function renderSelector(partners){
  var h='<nav class="nav"><div class="container" style="display:flex;align-items:center;width:100%;max-width:1040px;margin:0 auto"><div class="logo"><span>DARIMATI</span> Partner</div></div></nav>';
  h+='<section class="hero"><div class="container"><h1 style="color:var(--text-inv)">\ud30c\ud2b8\ub108 <em>\uc120\ud0dd</em></h1><div class="greeting" style="margin-top:8px">URL\uc5d0 ?partner=\uc774\ub984 \ud30c\ub77c\ubbf8\ud130\ub97c \ucd94\uac00\ud558\uac70\ub098 \uc544\ub798\uc5d0\uc11c \uc120\ud0dd\ud558\uc138\uc694</div></div></section>';
  h+='<section style="padding:32px 0"><div class="container"><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px">';
  partners.forEach(function(p){
    var name=p['\ud30c\ud2b8\ub108\uba85'];
    h+='<a href="?partner='+encodeURIComponent(name)+'" style="text-decoration:none"><div class="kpi-card" style="text-align:center;cursor:pointer;transition:border-color .2s"><div style="width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;margin:0 auto 10px">'+name.charAt(0)+'</div><div style="font-size:14px;font-weight:600;color:var(--text)">'+name+'</div><div style="font-size:11px;color:var(--muted);margin-top:4px">'+(p['\uc624\ud508\uc77c\uc790']||'')+'</div></div></a>';
  });
  h+='</div></div></section>';
  h+='<div class="footer"><div class="container">DARIMATI Affiliate</div></div>';
  return h;
}

async function load(){
  try{
    var r=await fetch(gvizUrl(SHEET_NAME));
    var t=await r.text();
    var d=parseGviz(t);
    var rows=extractRows(d);
    var partners=rows.filter(function(x){return x['\ud30c\ud2b8\ub108\uba85']&&x['\ud30c\ud2b8\ub108\uba85'].trim()!==''});
    var pn=getParam('partner');
    var app=document.getElementById('app');

    if(pn){
      var found=partners.find(function(p){return p['\ud30c\ud2b8\ub108\uba85']===pn});
      if(found){
        app.innerHTML=renderPartner(found);
        document.title='DARIMATI - '+found['\ud30c\ud2b8\ub108\uba85']+' Dashboard';
      }else{
        app.innerHTML=renderSelector(partners);
      }
    }else{
      app.innerHTML=renderSelector(partners);
    }
  }catch(e){
    document.getElementById('app').innerHTML='<div style="text-align:center;padding:80px 24px;color:var(--muted)"><h2>\ub370\uc774\ud130 \ub85c\ub4dc \uc2e4\ud328</h2><p style="margin-top:8px">'+e.message+'</p></div>';
  }
}
load();
setInterval(load,5*60*1000);
</script>
</body>
</html>
